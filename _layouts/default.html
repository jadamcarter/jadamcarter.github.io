<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/uzz2drx.css">
  <link rel="stylesheet" type="text/css" href="/css/main.css">
</head>
<body>

  <!-- Navbar (matches Quarto dark theme navbar) -->
  <header class="fixed-top">
    <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">J. Adam Carter</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Publications
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="/Books">Books</a></li>
                <li><a class="dropdown-item" href="/Articles">Articles</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/Works-in-Progress">Works in Progress</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/Research-Projects">Research Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/Talks">Talks</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/Media">Media and Outreach</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/CV">CV</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Trestles Layout -->
  <div class="quarto-about-trestles">

    <!-- Left: Profile Entity -->
    <div class="about-entity">
      <img src="/img/profile.jpg" alt="J. Adam Carter" class="about-image round">

      <div class="about-title">
        <h1>J. Adam Carter</h1>
      </div>

      <div class="about-links">
        <a href="https://www.gla.ac.uk/schools/humanities/staff/jadamcarter/" class="about-link" target="_blank">
          <i class="bi bi-mortarboard"></i>
          <span class="about-link-text">University of Glasgow</span>
        </a>
        <a href="https://www.cogito-glasgow.com/" class="about-link" target="_blank">
          <i class="bi bi-lightbulb"></i>
          <span class="about-link-text">COGITO Research Centre</span>
        </a>
        <a href="https://scholar.google.co.uk/citations?user=IE3DnXkAAAAJ&hl=en" class="about-link" target="_blank">
          <i class="bi bi-google"></i>
          <span class="about-link-text">Google Scholar</span>
        </a>
        <a href="mailto:adam.carter@glasgow.ac.uk" class="about-link">
          <i class="bi bi-mailbox"></i>
          <span class="about-link-text">Email</span>
        </a>
        <a href="https://philpeople.org/profiles/j-adam-carter" class="about-link" target="_blank">
          <i class="bi bi-person"></i>
          <span class="about-link-text">PhilPeople</span>
        </a>
        <a href="https://www.facebook.com/j.adam.carter" class="about-link" target="_blank">
          <i class="bi bi-facebook"></i>
          <span class="about-link-text">Facebook</span>
        </a>
      </div>
    </div>

    <!-- Right: Page Content -->
    <div class="about-contents">
      <main class="content">
        {{ content }}
      </main>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
